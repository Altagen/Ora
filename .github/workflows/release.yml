name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  # Only run releases from main branch
  check-branch:
    name: 🔍 Check Branch
    runs-on: ubuntu-latest
    outputs:
      is_main: ${{ steps.check.outputs.is_main }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if on main branch
        id: check
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          MAIN_COMMIT=$(git rev-parse origin/main)
          if [ "$TAG_COMMIT" = "$MAIN_COMMIT" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
            echo "::error::Tag must be created from main branch"
            exit 1
          fi

  # Create draft release with changelog
  create-release:
    name: 📋 Create Release
    needs: check-branch
    if: needs.check-branch.outputs.is_main == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: changelog.md

      - name: Create draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ora ${{ steps.version.outputs.version }}
          body_path: changelog.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build release binaries
  build-release:
    name: 🔨 Build (${{ matrix.platform }})
    needs: [check-branch, create-release]
    if: needs.check-branch.outputs.is_main == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            task: build-linux-amd64
            platform: linux-amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            task: build-linux-arm64
            platform: linux-arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            task: build-macos-amd64
            platform: macos-amd64
            target: ""
          - os: macos-latest
            task: build-macos-arm64
            platform: macos-arm64
            target: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nettle-dev

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: runner.os == 'Linux' && matrix.task == 'build-linux-arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install nettle

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary
        run: task ${{ matrix.task }}

      - name: Create archive
        run: task archive

      - name: Generate checksums
        run: task checksums

      - name: Build .deb and .rpm packages (Linux only)
        if: runner.os == 'Linux'
        run: |
          VERSION=$(grep '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          cargo install cargo-deb cargo-generate-rpm

          cargo deb --target ${{ matrix.target }} --no-build \
            --output "dist/ora-${VERSION}-${{ matrix.platform }}.deb"

          cargo generate-rpm --target ${{ matrix.target }} \
            -o "dist/ora-${VERSION}-${{ matrix.platform }}.rpm"

          sha256sum "dist/ora-${VERSION}-${{ matrix.platform }}.deb" > "dist/ora-${VERSION}-${{ matrix.platform }}.deb.sha256"
          sha256sum "dist/ora-${VERSION}-${{ matrix.platform }}.rpm" > "dist/ora-${VERSION}-${{ matrix.platform }}.rpm.sha256"

      - name: Build .pkg installer (macOS only)
        if: runner.os == 'macOS'
        run: |
          VERSION=$(grep '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          BINARY="dist/ora-${VERSION}-${{ matrix.platform }}"

          mkdir -p staging
          cp "${BINARY}" staging/ora
          chmod 755 staging/ora

          pkgbuild \
            --root staging \
            --identifier com.altagen.ora \
            --version "${VERSION}" \
            --install-location /usr/local/bin \
            "dist/ora-${VERSION}-${{ matrix.platform }}.pkg"

          sha256sum "dist/ora-${VERSION}-${{ matrix.platform }}.pkg" > "dist/ora-${VERSION}-${{ matrix.platform }}.pkg.sha256"

          rm -rf staging

      - name: Upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux packages to release
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.deb
            dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS installer to release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksums as artifact
        uses: actions/upload-artifact@v7
        with:
          name: checksum-${{ matrix.platform }}
          path: dist/*.sha256

  # Generate SBOM and consolidated checksums
  finalize:
    name: 📦 Finalize Release
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nettle-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        run: task sbom

      - name: Download checksum artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: checksum-*
          merge-multiple: true
          path: checksums/

      - name: Create SHA256SUMS.txt
        run: |
          cat checksums/*.sha256 > SHA256SUMS.txt
          echo "SHA256SUMS.txt contents:"
          cat SHA256SUMS.txt

      - name: Upload SBOM and SHA256SUMS.txt
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*sbom*
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish release (remove draft status)
  publish:
    name: 🚀 Publish Release
    needs: [create-release, finalize]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
